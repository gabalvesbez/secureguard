<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SecureGuard — Criar Conta</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  </head>
  <body class="auth-page">

    <div class="auth-container wide">
      <div class="auth-card">

        <div class="auth-card-header">
          <div class="auth-logo">
            <span class="auth-logo-dot"></span>
            SecureGuard
          </div>
          <div class="auth-subtitle">Criação de Conta — Acesso Protegido</div>
        </div>

        <div class="auth-card-body">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.75rem;">
            <div style="width:6px;height:6px;border-radius:50%;background:#fbbf24;box-shadow:0 0 8px #fbbf24;flex-shrink:0;"></div>
            <span style="font-family:var(--mono);font-size:0.65rem;color:var(--text-3);letter-spacing:0.12em;text-transform:uppercase;">Novo Registo — Preencha os seus dados</span>
          </div>

          <form id="formRegister" autocomplete="off">
            <div class="row mb-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input class="form-control" id="inputFirstName" type="text"  />
                  <label for="inputFirstName">Primeiro Nome</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input class="form-control" id="inputLastName" type="text" />
                  <label for="inputLastName">Último Nome</label>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <div class="form-floating">
                <input class="form-control" id="inputEmail" type="email"  />
                <label for="inputEmail">Endereço de Email</label>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <div class="form-floating posicao-container-password">
                  <input class="form-control" id="inputPassword" type="password" style="padding-right:45px;" />
                  <label for="inputPassword">Palavra-passe</label>
                  <button type="button" id="btnMostrarPassword" class="icone-password">
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input class="form-control" id="inputPasswordConfirm" type="password"  />
                  <label for="inputPasswordConfirm">Confirmar Palavra-passe</label>
                </div>
              </div>
            </div>

            <!-- Password strength hint -->
            <div style="margin-bottom:1.5rem;">
              <div style="font-family:var(--mono);font-size:0.65rem;color:var(--text-3);letter-spacing:0.08em;margin-bottom:0.5rem;">FORÇA DA PALAVRA-PASSE</div>
              <div style="display:flex;gap:4px;" id="strengthBars">
                <div style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:background 0.3s;" class="strength-bar"></div>
                <div style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:background 0.3s;" class="strength-bar"></div>
                <div style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:background 0.3s;" class="strength-bar"></div>
                <div style="height:3px;flex:1;background:var(--border);border-radius:2px;transition:background 0.3s;" class="strength-bar"></div>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-shield-halved me-1"></i>Criar Conta Segura
              </button>
            </div>
          </form>
        </div>

        <div class="auth-card-footer">
          <a href="login.html">Já tem conta? Faça login</a>
        </div>

      </div>

      <div style="text-align:center;margin-top:1.5rem;">
        <span style="font-family:var(--mono);font-size:0.62rem;color:var(--text-3);letter-spacing:0.1em;">© SECUREGUARD 2026 — TODOS OS DIREITOS RESERVADOS</span>
      </div>
    </div>

    <script src="js/scripts.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
