<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SecureGuard — A iniciar...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/loading.css" />
  </head>
  <body>
    <div class="scanlines"></div>
 
    <div class="card" id="loading-screen">
      <div class="card-accent"></div>
      <div class="card-inner">
 
        <div class="logo">
          <span class="logo-dot"></span>
          <span class="logo-text">SecureGuard</span>
        </div>
 
        <div class="lock-wrap">
          <div class="lock-ring" id="lockRing">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" id="lockIcon">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
        </div>
 
        <div class="status-label">Estado do Sistema</div>
        <div class="status-message" id="statusMessage">A estabelecer ligação segura...</div>
 
        <div class="progress-track">
          <div class="progress-fill indeterminate" id="progressFill"></div>
        </div>
        
        <div class="terminal" id="terminal">
        <div class="log-line err">
            <span class="log-prefix">[AVISO]</span>
            <span>Servidor em plano gratuito. O Cold Start pode demorar ~50s.</span>
        </div>
        </div>
 
        <div class="attempt-row" id="attemptDots">
          <div class="attempt-dot active" id="dot-0"></div>
          <div class="attempt-dot" id="dot-1"></div>
          <div class="attempt-dot" id="dot-2"></div>
          <div class="attempt-dot" id="dot-3"></div>
          <div class="attempt-dot" id="dot-4"></div>
        </div>
 
      </div>
      <div class="card-footer">
        <span class="footer-badge">SecureGuard © 2026</span>
        <span class="footer-status">
          <span class="footer-status-dot" id="footerDot"></span>
          <span id="footerLabel">A ligar...</span>
        </span>
      </div>
    </div>
 
    <script src="js/health-check.js"></script>
  </body>
</html>
